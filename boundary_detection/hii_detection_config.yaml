# HII 边界检测 — 算法参数配置
# 该文件由 detect_hii_boundary() 自动检测并加载
# 优先级：显式传参 > --config 指定文件 > 本文件 > 内置默认值
#
# 注意：图像像素值必须全部 > 0，零值会导致极坐标变换产生 NaN
# 测试代码中 _shift_image() 会自动处理此问题

# ============================================================================
# 稳定边界方法
# ============================================================================

# 稳定边界选择方法
# "scan"：在 [rmin_start, rmin_max] 之间等距采样 n_steps 个 rmin 值，
#         寻找边界差异不再变化的稳定区，取每角度平均 cost 最低的
# "iterative"：从小 rmin 开始逐步增大，连续 consecutive_stable 次
#              |diff| < stability_threshold 时判定收敛
method: "scan"

# ============================================================================
# 图像平滑
# ============================================================================

# 径向高斯平滑 FWHM（像素）
# 极坐标变换后沿径向 (axis=0) 做高斯滤波，抑制径向像素噪声
# 实际 sigma = FWHM / 2.355
# 0 = 禁用，不做径向平滑
smoothing_fwhm: 2.0

# 角度方向平滑 sigma（像素）
# 在构建 cost map 之前沿角度方向 (axis=1) 高斯滤波
# 用于消除相邻角度间的不连续毛刺，0 = 禁用
cost_map_smoothing_sigma: 5.0

# Sobel 梯度后角度平滑 sigma（像素）
# 对 Sobel 梯度图沿角度方向 (axis=1) 再做高斯滤波
# 进一步抑制梯度毛刺，0 = 禁用
gradient_smoothing_sigma: 0.0

# 最终边界后处理平滑 sigma（像素）
# 对 DP 输出的边界半径沿角度方向做高斯滤波
# 在不改变边界位置的情况下平滑小幅度抖动，0 = 禁用
boundary_smoothing_sigma: 0.0

# ============================================================================
# rmin 搜索范围
# ============================================================================

# rmin 起始比例
# rmin_start = max(rmax × rmin_start_ratio, rmin_min_pixels)
# 控制 DP 搜索的内半径起点，比例越小搜索范围越大
rmin_start_ratio: 0.05

# rmin 硬下限（像素）
# 防止 DP 路径进入图像中心噪声主导区域走捷径
# 实际 rmin = max(rmax × rmin_start_ratio, rmin_min_pixels)
rmin_min_pixels: 5.0

# rmin 上限比例
# rmin_max = rmax × rmax_limit_ratio
# 限制 rmin 搜索的最大值，避免扫描到边界外侧
# 对于测试模型：应确保 rmax × rmax_limit_ratio < 真实边界半径
rmax_limit_ratio: 0.7

# ============================================================================
# 反噪机制
# ============================================================================

# 角度方向结构 SNR 加权
# true = 对 cost map 进行角度方向信噪比加权
# 对空间变化噪声（如观测图像边缘更暗）有效
# 对均匀噪声（如测试高斯噪声）基本无影响
angular_snr_weighting: false

# SNR 计算中的角度平滑 sigma
# 仅在 angular_snr_weighting=true 时生效
angular_snr_sigma: 3.0

# 梯度符号一致性惩罚强度 β
# 对相邻角度梯度符号不一致的区域施加额外 cost
# cost_map += β × (1 - |Gaussian1d(sign(∇), σ)|)
# 0 = 禁用，建议范围 0.3 ~ 1.0
# 对均匀噪声（高斯噪声）效果显著，可防止 DP 走噪声捷径
coherence_penalty_weight: 0.5

# 一致性计算的角度平滑 sigma
# 仅在 coherence_penalty_weight > 0 时生效
# 控制梯度符号一致性的角度平滑程度
coherence_sigma: 3.0

# ============================================================================
# 梯度方向控制
# ============================================================================

# 是否检测上升沿（从暗到亮的边界）
# true = 检测正梯度（默认，适用于 HII 区内部暗、外部亮）
# false = 检测负梯度（适用于亮环外边界等场景）
detect_rising_edge: true

# ============================================================================
# 稳定边界扫描参数（仅 method="scan" 时生效）
# ============================================================================

# 扫描点数
# 在 [rmin_start, rmin_max] 之间均匀采样的 rmin 值数量
n_steps: 0

# 稳定区连续点数
# 连续 stable_window 个相邻 rmin 的边界差异变化 < stable_threshold
# 判定为一个稳定区
stable_window: 3

# 稳定区变化阈值
# |Δdiff| < stable_threshold 认为相邻 rmin 边界差异不变
stable_threshold: 1

# ============================================================================
# 椭圆先验参数（仅椭圆模式生效）
# ============================================================================

# 内边界扫描起始比例（f_min = max(ratio, f_min_min_pixels / a)）
f_min_start_ratio: 0.05

# f_min 硬下限（基于长轴的像素等价值）
f_min_min_pixels: 5.0

# f_min 扫描上限比例
f_max_limit_ratio: 0.7

# ============================================================================
# 多稳定区选择评分参数
# ============================================================================

# 梯度方向条带半宽（像素）
# 对每个稳定区，在边界 ±strip_width 条带内统计梯度方向一致性
# 梯度方向变化大的边界更可能受噪声干扰，精度不可靠
# 0 = 禁用（std 权重自动归零，退化为 cost+length 二项评分）
gradient_strip_width: 3

# 稳定区选择评分权重（仅多稳定区时生效）
# 三项权重之和应为 1.0，对每项做 min-max 归一化后加权求和
# mean_score 越大 → 越好（原始梯度分，未经 log 压缩，区分度更高）
# length 越大 → 越好（更稳定的区域）
# std 越小 → 越好（梯度方向更一致）
selection_weight_cost: 0.4
selection_weight_length: 0.3
selection_weight_std: 0.3

# 对比度计算条带半宽（像素）
# 边界每侧取 contrast_strip_width 像素计算均值差异
contrast_strip_width: 4

# 边界对比度最小阈值
# 边界两侧像素值差异 < contrast_min 的区域视为噪声路径直接淘汰
# 0 = 禁用过滤
contrast_min: 0.05

# ============================================================================
# Bootstrap 不确定性估计
# ============================================================================

# Bootstrap 迭代次数
# 对每个检测运行 N 次噪声重采样，每角度 std = 1σ 误差
# 0 = 跳过不确定性估计
# 场景 A：有 clean_image → 干净图直接加噪声
# 场景 B：仅 error_map → 含噪图叠加 ÷ √2 修正
# 场景 C：无 error_map → 跳过
n_bootstrap: 100

# Outlier 剔除（基于 MAD 方法）
# true = 启用 outlier 剔除，false = 使用简单 median
outlier_removal: true

# MAD 阈值（k 值）
# 越大越宽松（保留更多迭代），越小越严格（剔除更多迭代）
# 推荐 3.0（经典值，剔除约 0.7% 正常数据）
outlier_k: 3.0

# 并行进程数（1=单进程，>1=多进程并行）
n_workers: 10

# HDF5 结果保存路径（null = 不保存，填写路径则每次检测结束保存自描述 HDF5）
save_h5_path: null
