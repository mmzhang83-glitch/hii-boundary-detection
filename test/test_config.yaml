# HII 区域边界检测 — 测试配置文件
#
# 本文件控制 run_test_plan.py 执行的完整测试计划：
#   - 输出目录
#   - 图像尺寸与中心坐标
#   - 4 类测试模型（sharp / linear / sigmoid / Gaussian ring）
#   - 4 类测试（baseline / noise / center offset / rmax）
#   - Bootstrap 不确定度估计
#   - 随机种子（控制所有噪声实现，确保可重复性）

# 输出根目录（支持 ~ 和绝对路径）
output_dir: "test_plots"

# 是否仅重画图（跳过模型构建和检测计算，从已有结果生成 HTML 报告）
only_plot: false


# ============================================================================
# 图像参数
# ============================================================================

# 合成测试图像的尺寸（height, width），单位：像素。
# 所有模型共享同一图像尺寸。图像过小会导致边界靠近边缘，
# 过大则增加计算时间。
shape: [300, 300]

# 模型中心坐标（像素）。所有合成图像的径向轮廓以此为中心。
# 值通常设为 shape 的一半，使图像对称。
xc: 150.0
yc: 150.0


# ============================================================================
# 模型参数
# ============================================================================

# crater_r0: Sharp / Sigmoid / LinearRamp 模型的边界半径（像素）。
# 这是探测算法期望找到的真实边界位置。模型以此为中心构建径向轮廓。
# 默认 40.0 时，边界大约位于图像中心向外 40 像素处。
crater_r0: 60.0

# model_rmax_factor: rmax = 期望边界半径 × 这个因子。
# 控制算法的最大搜索半径（即极坐标变换的外半径）。
# 设为 1.6 可容纳 50% 中心偏移下最远侧边界仍被 rmax 覆盖。
# 所有模型类型共用此因子。
model_rmax_factor: 1.6

# crater_a: 边界内侧（r < R0）的像素值。
# Sharp/Sigmoid 模型中，内侧值低于外侧值形成"陨石坑"状的对比。
crater_a: 0.0

# crater_b: 边界外侧（r > R0）的像素值。
# crater_b - crater_a 决定了边界的信号幅度，也是噪声水平计算
# 的参考基准（噪声 sigma 表示为 crater_b - crater_a 的百分比）。
crater_b: 1.0

# ring_b_max: Gaussian Ring 模型的峰值强度。
# Gaussian Ring 的噪声基准为 ring_b_max（而非 crater_b - crater_a）。
# 噪声 sigma = level * ring_b_max。
ring_b_max: 1.0

# ring_r0: Gaussian Ring 模型的边界半径（像素）。
# 与 crater_r0 独立，使高斯环可以有不同的边界位置。
ring_r0: 60.0

# ring_sigmas: Gaussian Ring 模型的半高宽列表。
# 每个 sigma 值生成一个独立的模型。sigma 越小边界越尖锐，
# sigma 越大边界越模糊、越难精确定位。
ring_sigmas: [5.0, 10.0]

# sigmoid_ks: Sigmoid 模型的陡峭度参数列表。
# k 越小过渡越平缓（类似大 sigma 高斯），k 越大过渡越陡峭
# （接近 sharp step）。每个值生成一个独立的模型。
sigmoid_ks: [1.0, 5.0]

# ramp_half_widths: Linear Ramp 模型的过渡半宽列表（像素）。
# R1 = R0 - half_width, R2 = R0 + half_width。
# half_width 越小过渡越陡峭，越大过渡越平缓。
# 每个值生成一个独立的模型。
ramp_half_widths: [5.0, 10.0]


# ============================================================================
# 测试参数
# ============================================================================

# noise_levels: 噪声水平列表，表示为信号幅度的百分比。
# Crater 类模型：噪声 sigma = level * (crater_b - crater_a)
# Gaussian Ring 模型：噪声 sigma = level * ring_b_max
# 例如 level=0.10：噪声 sigma 为信号幅度的 10%。
# 对每个 level 独立执行一轮 test_noise（含 bootstrap）。
# 注意：level=0.05 且 n_bootstrap 较小时，所有 bootstrap 迭代
# 可能产生完全相同的边界（不确定度为 0），这是正常现象。
noise_levels: [0.10, 0.30]

# center_offsets: 中心偏移测试的偏移量列表。
# 每个值表示探测中心相对于真实模型中心的偏移程度，表示为
# 模型 expected_radius 的百分比。
# 例如 offset=0.10：中心偏移真实边界的 10%（R0=40 时偏移 4 px）。
# 用于测试算法对中心坐标误差的敏感度。
center_offsets: [0.10, 0.30, 0.50]

# rmax_values: 搜索半径敏感度测试的 rmax 列表（像素）。
# 针对同一模型用不同 rmax 反复探测，观察结果对搜索半径的稳定性。
rmax_values: [150.0]

# sensitivity_noise_level: 敏感度测试（center offset + rmax）的
# 固定噪声水平，表示为信号幅度的百分比（模型相关）。
# 默认为 30%，在显著噪声下评估算法的稳健性。
sensitivity_noise_level: 0.30


# ============================================================================
# Bootstrap 不确定度估计
# ============================================================================

# bootstrap_n: 每次噪声测试的 bootstrap 迭代次数。
# 每轮迭代：在合成噪声图像上重新运行完整边界探测流程，
# 收集 N 个边界，取标准差作为每角度的不确定度（1σ）。
# 推荐值：50-100 次（精度-速度平衡），
# 设为 0 可完全跳过 bootstrap（仅用于快速调试）。
# 注意：此值会被 --bootstrap-n CLI 参数覆盖。
bootstrap_n: 100


# ============================================================================
# 随机种子
# ============================================================================

# 所有噪声实现、bootstrap 重采样以及中心偏移随机方向的种子。
# 固定种子确保多次运行结果完全可重现。
# 修改此值将产生不同的噪声实现和偏移方向，
# 输出目录名将自动附加 "_seedNNN" 后缀。
seed: 43