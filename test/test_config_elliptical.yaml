# HII 区域边界检测 — 椭圆先验测试配置文件
#
# 本文件控制 run_test_plan_elliptical.py 执行的完整测试计划。
# 测试参数与边界探测参数完全分离，探测算法不依赖本文件。
#
# 边界探测参数见 hii_detection_config.yaml。

# ============================================================================
# 图像参数
# ============================================================================

shape: [300, 300]

# 模型中心坐标（像素）
xc: 150.0
yc: 150.0


# ============================================================================
# 椭圆模型参数
# ============================================================================

# 半长轴 a（像素）
a: 60.0

# 旋转角 φ（弧度），0 = 长轴沿 x 轴
phi: 0.0

# 短轴比率列表（b/a），每个比率生成一个模型
# b = a × ab_ratio
ab_ratios: [0.9, 0.7, 0.5]

# Sigmoid 陡峭度
sigmoid_k: 5.0

# crater_a: 边界内侧像素值
crater_a: 0.0

# crater_b: 边界外侧像素值
crater_b: 1.0


# ============================================================================
# 测试参数
# ============================================================================

# 噪声水平列表（信号幅度的百分比）
noise_levels: [0.10, 0.30]

# 中心偏移测试的偏移量列表（a 的百分比）
center_offsets: [0.10, 0.50]

# f_max 尺度因子列表（椭圆尺度放大/缩小）
f_max_values: [0.8, 1.0, 1.2]

# 敏感度测试（center offset + f_max）的固定噪声水平
sensitivity_noise_level: 0.30


# ============================================================================
# Bootstrap 不确定度估计
# ============================================================================

bootstrap_n: 10


# ============================================================================
# 随机种子
# ============================================================================

seed: 42
